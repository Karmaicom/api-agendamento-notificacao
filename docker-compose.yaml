version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: postgres_apiagendamentonotificacao
    restart: always
    environment:
      POSTGRES_DB: bd-apiagendamentonotificacao
      POSTGRES_USER: javanauta
      POSTGRES_PASSWORD: Javanauta@2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_apiagendamentonotificacao:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d db_agendamento" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api_agendamento_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_apiagendamentonotificacao
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: Javanauta@2026
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data_apiagendamentonotificacao:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - api_agendamento_network

  app:
    build: .
    container_name: agendamento
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bd-apiagendamentonotificacao
      SPRING_DATASOURCE_USERNAME: javanauta
      SPRING_DATASOURCE_PASSWORD: Javanauta@2026
    ports:
      - "8080:8080"

volumes:
  postgres_data_apiagendamentonotificacao:
  pgadmin_data_apiagendamentonotificacao:

networks:
  api_agendamento_network:
    driver: bridge